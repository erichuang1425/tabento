name: Bug report
description: Report a reproducible Tabento problem
title: "[Bug]: "
labels: [bug]
body:
  - type: markdown
    attributes:
      value: Remove private URLs, notes, and exported data before posting.
  - type: input
    id: version
    attributes: { label: Tabento version, placeholder: "3.1.1" }
    validations: { required: true }
  - type: input
    id: browser
    attributes: { label: Browser and version }
    validations: { required: true }
  - type: textarea
    id: steps
    attributes: { label: Steps to reproduce }
    validations: { required: true }
  - type: textarea
    id: expected
    attributes: { label: Expected behavior }
    validations: { required: true }
  - type: textarea
    id: actual
    attributes: { label: Actual behavior }
    validations: { required: true }
  - type: dropdown
    id: locale
    attributes:
      label: Interface language
      options: [English, 繁體中文, 简体中文, Español, 日本語, Français]
