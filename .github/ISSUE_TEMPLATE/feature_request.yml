name: Feature request
description: Suggest a focused legacy-maintenance improvement
title: "[Feature]: "
labels: [enhancement]
body:
  - type: textarea
    id: problem
    attributes: { label: Problem }
    validations: { required: true }
  - type: textarea
    id: proposal
    attributes: { label: Proposed solution }
    validations: { required: true }
  - type: checkboxes
    id: principles
    attributes:
      label: Project fit
      options:
        - label: The proposal remains local-only and account-free.
          required: true
        - label: The proposal requires no host permissions.
          required: true
        - label: The application remains branded Tabento.
          required: true
