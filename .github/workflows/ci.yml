name: ci
on:
  pull_request:
  push:
    branches: [main]
jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Syntax-check JS
        run: |
          set -e
          for f in newtab.js background.js popup.js suspended.js emoji-data.js; do
            echo "node --check $f"
            node --check "$f"
          done
      - name: Validate JSON
        run: |
          node -e "JSON.parse(require('fs').readFileSync('manifest.json','utf8'))"
      - name: Validate manifest fields
        run: |
          node -e "
            const m = JSON.parse(require('fs').readFileSync('manifest.json','utf8'));
            if (m.manifest_version !== 3) throw new Error('manifest_version must be 3');
            for (const k of ['name','version','permissions','background','action']) {
              if (!(k in m)) throw new Error('missing field: ' + k);
            }
            if (!m.background.service_worker) throw new Error('background.service_worker missing');
            if (!Array.isArray(m.permissions)) throw new Error('permissions must be an array');
          "
