<svg xmlns="http://www.w3.org/2000/svg" width="1080" height="1920" viewBox="0 0 1080 1920" role="img" aria-labelledby="title desc">
  <title id="title">Tabento upcoming release Instagram Story spoiler</title>
  <desc id="desc">A premium warm rice-paper Instagram Story teaser for an upcoming Tabento release, featuring bento-inspired product cards, soft gradients, and launch copy.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#fff6e6"/>
      <stop offset="0.46" stop-color="#f3ead7"/>
      <stop offset="1" stop-color="#ecd5b2"/>
    </linearGradient>
    <linearGradient id="brand" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#f7c76a"/>
      <stop offset="0.48" stop-color="#e5773f"/>
      <stop offset="1" stop-color="#7c4dff"/>
    </linearGradient>
    <linearGradient id="lacquer" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#2a2017"/>
      <stop offset="1" stop-color="#110d0a"/>
    </linearGradient>
    <radialGradient id="glowTop" cx="78%" cy="18%" r="48%">
      <stop offset="0" stop-color="#f7c76a" stop-opacity="0.58"/>
      <stop offset="1" stop-color="#f7c76a" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="glowBottom" cx="18%" cy="82%" r="52%">
      <stop offset="0" stop-color="#7c4dff" stop-opacity="0.18"/>
      <stop offset="1" stop-color="#7c4dff" stop-opacity="0"/>
    </radialGradient>
    <filter id="softShadow" x="-20%" y="-20%" width="140%" height="150%">
      <feDropShadow dx="0" dy="22" stdDeviation="28" flood-color="#5b3a1f" flood-opacity="0.18"/>
    </filter>
    <filter id="chipShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="10" stdDeviation="14" flood-color="#3f2a17" flood-opacity="0.16"/>
    </filter>
    <clipPath id="storySafe">
      <rect x="72" y="96" width="936" height="1728" rx="64"/>
    </clipPath>
    <style>
      .serif { font-family: Georgia, 'Times New Roman', serif; }
      .sans { font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; }
      .eyebrow { font-size: 30px; font-weight: 760; letter-spacing: 0.24em; }
      .headline { font-size: 106px; font-weight: 760; letter-spacing: -0.065em; }
      .body { font-size: 34px; font-weight: 560; letter-spacing: -0.018em; }
      .small { font-size: 26px; font-weight: 720; letter-spacing: 0.08em; }
      .micro { font-size: 22px; font-weight: 700; letter-spacing: 0.05em; }
    </style>
  </defs>

  <rect width="1080" height="1920" fill="url(#bg)"/>
  <rect width="1080" height="1920" fill="url(#glowTop)"/>
  <rect width="1080" height="1920" fill="url(#glowBottom)"/>

  <g clip-path="url(#storySafe)">
    <path d="M-120 418 C202 302 332 456 554 352 C808 232 936 156 1190 246" fill="none" stroke="#fff7e8" stroke-width="2" opacity="0.55"/>
    <path d="M-128 1458 C174 1346 358 1518 612 1396 C842 1286 966 1228 1202 1322" fill="none" stroke="#805729" stroke-width="2" opacity="0.08"/>

    <g transform="translate(92 112)">
      <rect x="0" y="0" width="896" height="88" rx="44" fill="#fffaf0" opacity="0.7"/>
      <g transform="translate(28 20)">
        <rect x="0" y="0" width="48" height="48" rx="14" fill="url(#lacquer)"/>
        <path d="M13 14h22c4.4 0 8 3.6 8 8v12c0 4.4-3.6 8-8 8H13V14Z" fill="none" stroke="url(#brand)" stroke-width="3" stroke-linejoin="round"/>
        <path d="M23 14v28M13 26h30" stroke="#fff1d3" stroke-width="2" opacity="0.7"/>
      </g>
      <text x="96" y="55" class="sans small" fill="#251913">TABENTO</text>
      <text x="722" y="55" class="sans micro" fill="#7b5a36">PRIVATE BY DEFAULT</text>
    </g>

    <g transform="translate(92 328)">
      <rect x="0" y="0" width="264" height="58" rx="29" fill="#21160f" filter="url(#chipShadow)"/>
      <rect x="3" y="3" width="258" height="52" rx="26" fill="none" stroke="url(#brand)" stroke-width="3"/>
      <text x="34" y="39" class="sans eyebrow" fill="#fff5dc">SPOILER</text>
    </g>

    <text x="92" y="518" class="sans headline" fill="#21160f">Your tabs</text>
    <text x="92" y="632" class="sans headline" fill="#21160f">are about</text>
    <text x="92" y="746" class="sans headline" fill="#21160f">to feel</text>
    <text x="92" y="860" class="sans headline" fill="url(#brand)">lighter.</text>

    <text x="94" y="948" class="sans body" fill="#684c31">A cleaner workspace. Sharper focus.</text>
    <text x="94" y="994" class="sans body" fill="#684c31">Less browser weight. Same local-first calm.</text>

    <g transform="translate(128 1114) rotate(-2)" filter="url(#softShadow)">
      <rect x="0" y="0" width="824" height="478" rx="48" fill="#fffaf1"/>
      <rect x="0" y="0" width="824" height="8" rx="4" fill="url(#brand)"/>
      <rect x="42" y="44" width="160" height="34" rx="17" fill="#21160f" opacity="0.92"/>
      <rect x="646" y="44" width="92" height="34" rx="17" fill="#f1dec0"/>
      <rect x="748" y="44" width="34" height="34" rx="17" fill="#e5773f" opacity="0.86"/>

      <g transform="translate(42 116)">
        <rect x="0" y="0" width="218" height="284" rx="30" fill="#f6ead6"/>
        <rect x="20" y="24" width="128" height="22" rx="11" fill="#251913" opacity="0.82"/>
        <rect x="20" y="70" width="178" height="42" rx="18" fill="#fff7e6"/>
        <rect x="20" y="128" width="142" height="42" rx="18" fill="#fff7e6"/>
        <rect x="20" y="202" width="68" height="18" rx="9" fill="#e5773f" opacity="0.85"/>
      </g>
      <g transform="translate(302 116)">
        <rect x="0" y="0" width="218" height="284" rx="30" fill="#efe2c9"/>
        <rect x="20" y="24" width="118" height="22" rx="11" fill="#251913" opacity="0.82"/>
        <circle cx="48" cy="93" r="24" fill="#9fceb5"/>
        <rect x="86" y="75" width="96" height="18" rx="9" fill="#fff7e6"/>
        <rect x="86" y="103" width="74" height="18" rx="9" fill="#fff7e6"/>
        <rect x="20" y="202" width="106" height="18" rx="9" fill="#7c4dff" opacity="0.76"/>
      </g>
      <g transform="translate(562 116)">
        <rect x="0" y="0" width="218" height="284" rx="30" fill="#f2e8d6"/>
        <rect x="20" y="24" width="104" height="22" rx="11" fill="#251913" opacity="0.82"/>
        <path d="M28 96h160M28 142h120M28 188h142" stroke="#fff7e6" stroke-width="22" stroke-linecap="round"/>
        <path d="M30 96h20M30 142h20M30 188h20" stroke="#e5773f" stroke-width="10" stroke-linecap="round"/>
      </g>
    </g>

    <g transform="translate(92 1684)">
      <rect x="0" y="0" width="896" height="112" rx="56" fill="#21160f"/>
      <rect x="4" y="4" width="888" height="104" rx="52" fill="none" stroke="url(#brand)" stroke-width="3" opacity="0.9"/>
      <text x="56" y="70" class="sans body" fill="#fff5dc">Upcoming release</text>
      <path d="M728 56h86m0 0-30-30m30 30-30 30" fill="none" stroke="#fff5dc" stroke-width="10" stroke-linecap="round" stroke-linejoin="round"/>
    </g>
  </g>
</svg>
