<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>&#65279;</title>
  <style>
    :root { color-scheme: light dark; }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    html, body {
      height: 100%;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
      background: #17120d;
      color: #f6ecda;
      -webkit-font-smoothing: antialiased;
    }
    @media (prefers-color-scheme: light) {
      html, body { background: #f6efe2; color: #221a12; }
      .url, .hint { color: #6b5c45 !important; }
      .btn { background: rgba(207,125,29,0.12) !important; color: #b06a13 !important; }
      .btn:hover { background: rgba(207,125,29,0.2) !important; }
      .tag { background: rgba(60,40,15,0.05) !important; border-color: rgba(60,40,15,0.08) !important; color: #6b5c45 !important; }
      .fav-wrap { background: linear-gradient(135deg, rgba(245,184,65,0.14), rgba(236,111,76,0.07)) !important; }
    }
    body { display: flex; align-items: center; justify-content: center; min-height: 100vh; padding: 40px 20px; cursor: pointer; }
    .box { text-align: center; max-width: 460px; display: flex; flex-direction: column; align-items: center; gap: 18px; }
    .fav-wrap {
      width: 80px; height: 80px; border-radius: 18px;
      background: linear-gradient(135deg, rgba(245,184,65,0.14), rgba(236,111,76,0.08));
      display: flex; align-items: center; justify-content: center;
      position: relative; overflow: hidden;
    }
    .fav-wrap::after { content: ''; position: absolute; inset: 0; background: radial-gradient(circle at center, rgba(245,184,65,0.16), transparent 70%); }
    .fav { width: 42px; height: 42px; border-radius: 9px; object-fit: contain; position: relative; z-index: 1; }
    h1 { font-weight: 600; font-size: 22px; line-height: 1.35; letter-spacing: -0.01em; max-height: 3em; overflow: hidden; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; }
    .url { font-size: 13px; color: #c6b498; word-break: break-all; opacity: 0.75; }
    .tag {
      display: inline-flex; align-items: center; gap: 5px; padding: 3px 9px;
      background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.08); border-radius: 20px;
      font-size: 10.5px; color: #c6b498; text-transform: uppercase; letter-spacing: 0.08em; font-weight: 500;
    }
    .dot { width: 6px; height: 6px; border-radius: 50%; background: #9cc05a; box-shadow: 0 0 10px #9cc05a; animation: pulse 2s ease-in-out infinite; }
    @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.4; } }
    .btn {
      margin-top: 8px; padding: 10px 22px;
      background: rgba(245,184,65,0.15); color: #f5b841;
      border: none; border-radius: 10px; font: 500 13px inherit; cursor: pointer;
      display: inline-flex; align-items: center; gap: 7px;
    }
    .btn:hover { background: rgba(245,184,65,0.25); }
  </style>
</head>
<body>
  <div class="box">
    <div class="tag">
      <span class="dot"></span>
      <span id="status-text">Hibernated · loads when you switch to this tab</span>
    </div>
    <div class="fav-wrap"><img id="fav" class="fav" alt=""></div>
    <h1 id="title">Loading…</h1>
    <div class="url" id="url"></div>
    <button class="btn" id="load-btn">
      <svg width="13" height="13" viewBox="0 0 13 13" fill="none"><path d="M6.5 1v8m0 0l3-3m-3 3l-3-3M2 10.5v1a1 1 0 001 1h7a1 1 0 001-1v-1" stroke="currentColor" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round"/></svg>
      Load now
    </button>
  </div>
  <script src="suspended.js"></script>
</body>
</html>
