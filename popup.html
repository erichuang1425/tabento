<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
  <meta charset="UTF-8">
  <title>Tabento</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="icon" type="image/png" sizes="32x32" href="icons/icon32.png">
  <link rel="icon" type="image/png" sizes="16x16" href="icons/icon16.png">
  <link rel="icon" type="image/png" sizes="48x48" href="icons/icon48.png">
  <link rel="icon" type="image/png" sizes="128x128" href="icons/icon128.png">
  <link rel="icon" href="favicon.ico" sizes="any">
  <link rel="shortcut icon" href="favicon.ico">
  <link rel="stylesheet" href="themes.css">
  <link rel="stylesheet" href="popup.css">
</head>
<body>
  <div id="popup">
    <div class="ph">
      <div class="logo">
        <img class="brand-mark" src="icons/icon128.png" width="20" height="20" alt="" aria-hidden="true">
        Tabento
      </div>
      <button id="open-full" class="ph-btn" title="Open full workspace" aria-label="Open full workspace" data-popup-i18n-title="openFull">
        <svg width="13" height="13" viewBox="0 0 12 12" fill="none"><path d="M4 2.5H2a1 1 0 00-1 1v6.5A1 1 0 002 11h6.5a1 1 0 001-1V8M7 1h4m0 0v4M11 1L5.5 6.5" stroke="currentColor" stroke-width="1.3" stroke-linecap="round" stroke-linejoin="round"/></svg>
      </button>
    </div>

    <!-- Primary quick actions -->
    <div class="pa">
      <div class="pa-row">
        <button id="qs-current" class="pa-btn primary">
          <svg width="14" height="14" viewBox="0 0 14 14" fill="none"><path d="M2 2.5h7l3 3v6H2v-9z" stroke="currentColor" stroke-width="1.3" stroke-linejoin="round"/><path d="M4.5 2.5v3h4v-3M4.5 11.5V8h5v3.5" stroke="currentColor" stroke-width="1.2" stroke-linejoin="round"/></svg>
          <span data-popup-i18n="saveCurrent">Save current</span>
        </button>
        <button id="qs-all" class="pa-btn">
          <svg width="14" height="14" viewBox="0 0 14 14" fill="none"><rect x="2" y="3.5" width="8" height="8" rx="1.3" stroke="currentColor" stroke-width="1.2"/><path d="M4.5 3.5v-1a1 1 0 011-1h6a1 1 0 011 1v6a1 1 0 01-1 1h-1" stroke="currentColor" stroke-width="1.2" stroke-linejoin="round"/></svg>
          <span data-popup-i18n="saveAll">Save all · <b id="qs-count">0</b></span>
        </button>
      </div>
      <button id="hib-open" class="pa-btn pa-wide">
        <svg width="14" height="14" viewBox="0 0 14 14" fill="none"><path d="M11.5 8.2A4.6 4.6 0 015.8 2.5a4.6 4.6 0 105.7 5.7z" stroke="currentColor" stroke-width="1.25" stroke-linejoin="round"/></svg>
        <span data-popup-i18n="hibernateTabs">Hibernate tabs</span>
        <span class="pa-hint" id="hib-open-hint"></span>
      </button>
    </div>

    <!-- Save-to picker -->
    <div id="save-to-section" class="hidden">
      <div class="sect-hd">
        <span data-popup-i18n="saveTo">Save to</span>
        <button id="stg-back" class="link-btn" data-popup-i18n="back">← back</button>
      </div>
      <div id="stg-list"></div>
    </div>

    <!-- Hibernate options -->
    <div id="hibernate-section" class="hidden">
      <div class="sect-hd">
        <span data-popup-i18n="hibernateTabs">Hibernate tabs</span>
        <button id="hib-back" class="link-btn" data-popup-i18n="back">← back</button>
      </div>
      <p class="hib-note" data-popup-i18n="hibernateNote">Suspend tabs to free memory — they reload when opened. The tab you're viewing stays awake.</p>
      <div class="hib-opt">
        <span class="hib-opt-lbl" data-popup-i18n="scope">Scope</span>
        <div class="seg" id="hib-scope">
          <button data-val="window" class="active" data-popup-i18n="thisWindow">This window</button>
          <button data-val="all" data-popup-i18n="allWindows">All windows</button>
        </div>
      </div>
      <label class="hib-toggle">
        <input type="checkbox" id="hib-keep-pinned" checked>
        <span class="hib-tog-box"></span>
        <span class="hib-tog-lbl" data-popup-i18n="keepPinned">Keep pinned tabs</span>
      </label>
      <label class="hib-toggle">
        <input type="checkbox" id="hib-keep-audio" checked>
        <span class="hib-tog-box"></span>
        <span class="hib-tog-lbl" data-popup-i18n="keepAudio">Keep tabs playing audio</span>
      </label>
      <button id="hib-go" class="pa-btn primary hib-go">
        <svg width="14" height="14" viewBox="0 0 14 14" fill="none"><path d="M11.5 8.2A4.6 4.6 0 015.8 2.5a4.6 4.6 0 105.7 5.7z" stroke="currentColor" stroke-width="1.25" stroke-linejoin="round"/></svg>
        <span>Hibernate <b id="hib-count">0</b> tabs</span>
      </button>
    </div>

    <!-- Open tabs -->
    <div id="main-section">
      <div class="search-wrap">
        <svg width="12" height="12" viewBox="0 0 16 16">
          <circle cx="6.5" cy="6.5" r="4.5" stroke="currentColor" stroke-width="1.5" fill="none"/>
          <path d="M10 10l3 3" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
        </svg>
        <input id="ps" type="text" placeholder="Search open tabs…" data-popup-i18n-placeholder="searchTabs" autocomplete="off">
      </div>
      <div class="sect-hd"><span data-popup-i18n="openTabs">Open tabs</span></div>
      <div id="ptabs"></div>
    </div>
  </div>
  <script src="popup.js"></script>
</body>
</html>
