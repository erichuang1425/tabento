<svg width="128" height="128" viewBox="0 0 128 128" xmlns="http://www.w3.org/2000/svg">
  <!-- Tabento mark: a browser-tab notch on a bento box (tab + bento). The box
       holds the classic asymmetric bento partition - one large compartment plus
       two small - in rice, persimmon, and matcha; the tab carries tamago gold.
       Reads as its own thing, not TabExtend's favicon bubbles. -->
  <!-- tab notch sitting on the box's top edge -->
  <rect x="30" y="16" width="42" height="24" rx="9" fill="#f5b841"/>
  <!-- lacquer box body -->
  <rect x="14" y="34" width="100" height="80" rx="20" fill="#1f1812"/>
  <rect x="14.75" y="34.75" width="98.5" height="78.5" rx="19.25" fill="none"
        stroke="#f5dcb4" stroke-opacity="0.16" stroke-width="1.5"/>
  <!-- compartments: large rice cell + persimmon and matcha -->
  <rect x="26" y="48" width="34" height="56" rx="7" fill="#f6ecda"/>
  <rect x="66" y="48" width="36" height="26" rx="7" fill="#ec6f4c"/>
  <rect x="66" y="78" width="36" height="26" rx="7" fill="#9cc05a"/>
</svg>
