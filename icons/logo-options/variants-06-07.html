<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Tabento 06/07 Variants</title>
<style>
  :root { color-scheme: dark; }
  body { margin:0; padding:32px; background:#17120d; color:#f6ecda; font:14px/1.45 system-ui, sans-serif; }
  h1 { margin:0 0 6px; font-size:22px; }
  p { margin:0 0 22px; color:#c6b498; }
  h2 { margin:26px 0 12px; font-size:13px; color:#f5b841; letter-spacing:.08em; text-transform:uppercase; }
  .grid { display:grid; grid-template-columns:repeat(6, 144px); gap:12px; }
  figure { margin:0; padding:14px; background:#1f1812; border:1px solid rgba(245,220,180,0.12); border-radius:12px; }
  img { width:96px; height:96px; display:block; margin:0 auto 12px; }
  figcaption { color:#c6b498; text-align:center; font-weight:600; font-size:13px; }
</style>
</head>
<body>
  <h1>Tabento 06/07 Variants</h1>
  <p>More directions based on Window Grid and Soft Grid.</p>
  <h2>Window Grid Family</h2>
  <div class="grid">
    <figure><img src="variant-06a-window-grid.svg" alt=""><figcaption>06A Grid</figcaption></figure>
    <figure><img src="variant-06b-window-compact.svg" alt=""><figcaption>06B Compact</figcaption></figure>
    <figure><img src="variant-06c-window-float.svg" alt=""><figcaption>06C Float</figcaption></figure>
    <figure><img src="variant-06d-window-card.svg" alt=""><figcaption>06D Card</figcaption></figure>
    <figure><img src="variant-06e-window-line.svg" alt=""><figcaption>06E Line</figcaption></figure>
    <figure><img src="variant-06f-window-glyph.svg" alt=""><figcaption>06F Glyph</figcaption></figure>
  </div>
  <h2>Soft Grid Family</h2>
  <div class="grid">
    <figure><img src="variant-07a-soft-grid.svg" alt=""><figcaption>07A Grid</figcaption></figure>
    <figure><img src="variant-07b-soft-squircle.svg" alt=""><figcaption>07B Squircle</figcaption></figure>
    <figure><img src="variant-07c-soft-bento.svg" alt=""><figcaption>07C Bento</figcaption></figure>
    <figure><img src="variant-07d-soft-tab.svg" alt=""><figcaption>07D Tab</figcaption></figure>
    <figure><img src="variant-07e-soft-chip.svg" alt=""><figcaption>07E Chip</figcaption></figure>
    <figure><img src="variant-07f-soft-mark.svg" alt=""><figcaption>07F Mark</figcaption></figure>
  </div>
</body>
</html>
